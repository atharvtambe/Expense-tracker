
{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block css %}
<link rel="stylesheet"
      href="{{ url_for('static', path='css/auth.css') }}">
{% endblock %}

{% block content %}

<div class="container">

    <h1>Create Account</h1>

    <form id="registerForm">

        <input
            type="text"
            placeholder="Full Name"
            required>

        <input
            type="email"
            placeholder="Email"
            required>

        <input
            type="password"
            placeholder="Password"
            required>

        <input
            type="password"
            placeholder="Confirm Password"
            required>

        <button>
            Register
        </button>

    </form>

</div>

{% endblock %}
