{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block css %}
<link rel="stylesheet"
      href="{{ url_for('static', path='css/auth.css') }}">
{% endblock %}

{% block content %}

<div class="container">

    <h1>Login</h1>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="Email"
            required>

        <input
            type="password"
            id="password"
            placeholder="Password"
            required>

        <button type="submit" >
            Login
        </button>

    </form>

</div>

{% endblock %}

{% block javascript %}
<script src="{{ url_for('static', path='js/login.js') }}"></script>
{% endblock %}
